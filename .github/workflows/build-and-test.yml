name: Build and test

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build
        run: dotnet build DCA_Padel_Club.sln -c Release

      - name: Test
        run: dotnet test DCA_Padel_Club.sln -c Release --no-build
